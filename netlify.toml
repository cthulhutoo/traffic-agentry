[build]
  command   = "npm run build"
  publish   = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Redirects live in client/public/_redirects (copied to dist/public at build).
# Some Netlify build images apply _redirects more reliably than netlify.toml
# rules when both exist - using _redirects only avoids that ambiguity.

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
