# /etc/nginx/snippets/agentry-traffic-metrics.conf
#
# Internal endpoint that serves the JSON snapshot written by
# /usr/local/bin/agentry_traffic_parser.py.
#
# Token must match VPS_METRICS_TOKEN in Netlify env vars.
# DO NOT commit the real token to source control - replace REPLACE_WITH_TOKEN
# below with the value from your password manager / Netlify env var before
# reloading nginx. Rotate by updating both sides simultaneously.

location = /internal/traffic-metrics {
    if ($arg_token != "REPLACE_WITH_TOKEN") {
        return 403;
    }

    alias /var/lib/agentry/traffic_metrics.json;
    default_type application/json;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Defence in depth: only Netlify edge should hit this. Optional allowlist:
    # allow 0.0.0.0/0;  # tighten if you want to lock to Netlify egress IPs
    # deny all;
}
